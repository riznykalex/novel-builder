<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Visual Novel Builder</title>
<script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly/msg/uk.js"></script>
<style>
  :root {
    --bg: #12111a;
    --surface: #1c1b27;
    --panel: #22213a;
    --border: #35345a;
    --accent: #7c6af7;
    --accent2: #f76a8c;
    --text: #e8e6ff;
    --muted: #888;
    --btn-bg: #2a2940;
    --btn-hover: #3a3860;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    display: flex; flex-direction: column; height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
  }

  /* ── TOOLBAR ── */
  #toolbar {
    background: var(--surface);
    padding: 8px 14px;
    display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  #toolbar .logo {
    font-size: 1em; font-weight: 700;
    color: var(--accent); margin-right: 8px; letter-spacing: .5px;
  }
  #toolbar button {
    padding: 7px 14px; background: var(--btn-bg);
    color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; font-size: .85em;
    transition: background .15s, border-color .15s;
  }
  #toolbar button:hover { background: var(--btn-hover); border-color: var(--accent); }
  #toolbar button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  #toolbar button.primary:hover { background: #6b5ae0; }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; flex: 1; overflow: hidden; }
  #blocklyDiv { width: 55%; height: 100%; border-right: 1px solid var(--border); }

  /* ── PREVIEW ── */
  #preview {
    width: 45%; position: relative;
    background: #000; display: flex;
    flex-direction: column; overflow: hidden;
  }
  #background {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: background-image .3s;
  }
  #bg-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: #333; font-size: .85em;
    pointer-events: none;
  }
  #bg-placeholder .icon { font-size: 2.5em; }




  #slots {
    position: absolute; top: 0; left: 0; right: 0; bottom: 170px;
    display: flex; align-items: flex-end;
  }
  .slot {
    flex: 1; height: 100%;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
  }
  .slot img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; display: block;
  }



  /* textbox */
  #textbox {
    position: relative; z-index: 10;
    background: linear-gradient(180deg, rgba(18,17,26,.0) 0%, rgba(18,17,26,.97) 18px);
    padding: 16px 18px 14px;
    min-height: 170px; display: flex; flex-direction: column;
  }
  #speaker {
    font-weight: 700; font-size: .9em;
    color: var(--accent); margin-bottom: 6px;
    min-height: 18px; letter-spacing: .3px;
  }
  #text {
    font-size: 1em; line-height: 1.6;
    min-height: 60px; color: var(--text);
    flex: 1;
  }
  #nextBtn {
    align-self: flex-end; margin-top: 10px;
    padding: 8px 22px; background: var(--accent);
    color: #fff; border: none; border-radius: 6px;
    cursor: pointer; font-size: .9em;
    transition: background .15s;
  }
  #nextBtn:hover { background: #6b5ae0; }

  #choices { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  #choices button {
    padding: 10px 14px; background: var(--btn-bg);
    color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; text-align: left;
    font-size: .9em; transition: background .15s, border-color .15s;
  }
  #choices button:hover { background: var(--btn-hover); border-color: var(--accent2); color: var(--accent2); }

  /* status bar */
  #statusBar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 5px 14px; font-size: .75em; color: var(--muted);
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  #statusBar span b { color: var(--accent); }

  /* toast */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: .85em;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* demo modal */
  #demoModal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  #demoModal.open { display: flex; }
  #demoBox {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 32px; max-width: 420px; width: 90%;
    text-align: center;
  }
  #demoBox h2 { margin-bottom: 10px; color: var(--accent); font-size: 1.2em; }
  #demoBox p  { color: var(--muted); font-size: .9em; margin-bottom: 20px; line-height: 1.5; }
  #demoBox button {
    padding: 10px 24px; margin: 5px;
    border-radius: 7px; border: 1px solid var(--border);
    cursor: pointer; font-size: .9em;
    background: var(--btn-bg); color: var(--text);
    transition: background .15s;
  }
  #demoBox button.ok { background: var(--accent); border-color: var(--accent); color: #fff; }
  #demoBox button.ok:hover { background: #6b5ae0; }
  #demoBox button:hover { background: var(--btn-hover); }
</style>
</head>
<body>

<div id="toolbar">
  <span class="logo">📖 VN Builder</span>
  <button class="primary" onclick="startNovel()">▶ Запустити</button>
  <button onclick="saveProject()">💾 Зберегти</button>
  <button onclick="loadProject()">📂 Завантажити</button>
  <button onclick="loadDemo()">🎓 Демо</button>
  <button onclick="clearWorkspace()">🗑 Очистити</button>
  <button onclick="exportGame()" style="margin-left:auto;">📤 Експорт гри</button>
</div>

<div id="main">
  <div id="blocklyDiv"></div>
  <div id="preview">
    <div id="background"></div>
    <div id="bg-placeholder">
      <div class="icon">🖼</div>
      <div>Фон з'явиться тут</div>
    </div>
    <div id="slots">
      <div class="slot" id="slot-left"></div>
      <div class="slot" id="slot-center"></div>
      <div class="slot" id="slot-right"></div>
    </div>
    <div id="textbox">
      <div id="speaker"></div>
      <div id="text">Натисніть ▶ Запустити або додайте блоки для перегляду.</div>
      <button id="nextBtn" style="display:none" onclick="onNext()">Далі →</button>
      <div id="choices"></div>
    </div>
  </div>
</div>

<div id="statusBar">
  <span>Сцена: <b id="stScene">—</b></span>
  <span>Змінні: <b id="stVars">—</b></span>
  <span>Блоків: <b id="stBlocks">0</b></span>
</div>

<div id="toast"></div>

<div id="demoModal">
  <div id="demoBox">
    <h2>🎓 Демо-проєкт</h2>
    <p>Завантажити приклад сцени з діалогом, вибором гравця та розгалуженням? Поточний робочий простір буде очищено.</p>
    <button class="ok" onclick="confirmDemo()">Завантажити</button>
    <button onclick="document.getElementById('demoModal').classList.remove('open')">Скасувати</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let workspace;
let scenes = {};
let variables = {};

// Execution state
let execQueue = [];   // flat list of block descriptors for current scene
let execIndex = 0;    // current position
let waitingForUser = false;

// imageData store: blockId → dataURL  (survives serialisation)
let imageStore = {};

// ══════════════════════════════════════════════════════════════
// BLOCK DEFINITIONS
// ══════════════════════════════════════════════════════════════
Blockly.Blocks['start_scene'] = {
  init() {
    this.appendDummyInput()
        .appendField("🎬 СЦЕНА")
        .appendField(new Blockly.FieldTextInput("Початок"), "NAME");
    this.setNextStatement(true);
    this.setColour(160);
    this.setTooltip("Починає нову сцену. Перша сцена запуститься першою.");
  }
};

Blockly.Blocks['set_background'] = {
  init() {
    this.appendDummyInput()
        .appendField("🖼 Фон:")
        .appendField(new Blockly.FieldTextInput("натисни для завантаження"), "LABEL");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(20);
    this.setTooltip("Натисніть на блок, щоб завантажити фонове зображення.");
  }
};

Blockly.Blocks['show_image'] = {
  init() {
    this.appendDummyInput()
        .appendField("🧍 Персонаж:")
        .appendField(new Blockly.FieldTextInput("натисни для завантаження"), "LABEL")
        .appendField("позиція")
        .appendField(new Blockly.FieldDropdown([
          ["зліва","left"], ["справа","right"], ["по центру","center"]
        ]), "POSITION");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(60);
    this.setTooltip("Натисніть на блок, щоб завантажити зображення. Кожна позиція (зліва/центр/справа) — окремий слот.");
  }
};

Blockly.Blocks['hide_characters'] = {
  init() {
    this.appendDummyInput().appendField("🚫 Прибрати всіх персонажів");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(60);
    this.setTooltip("Видаляє усіх персонажів з екрану.");
  }
};

// FIX: speaker + text in one block
Blockly.Blocks['display_text'] = {
  init() {
    this.appendDummyInput()
        .appendField("💬 Мовець:")
        .appendField(new Blockly.FieldTextInput(""), "SPEAKER");
    this.appendDummyInput()
        .appendField("   Текст:")
        .appendField(new Blockly.FieldTextInput("Привіт!"), "TEXT");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(230);
    this.setTooltip("Показує репліку. Поле 'Мовець' можна залишити порожнім.");
  }
};

Blockly.Blocks['set_variable'] = {
  init() {
    this.appendDummyInput()
        .appendField("📦 Змінна")
        .appendField(new Blockly.FieldTextInput("здоров'я"), "VAR")
        .appendField("=")
        .appendField(new Blockly.FieldNumber(100, -9999, 9999), "VALUE");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(300);
    this.setTooltip("Встановлює значення змінної.");
  }
};

Blockly.Blocks['change_variable'] = {
  init() {
    this.appendDummyInput()
        .appendField("📦 Змінна")
        .appendField(new Blockly.FieldTextInput("здоров'я"), "VAR")
        .appendField(new Blockly.FieldDropdown([["+","PLUS"],["-","MINUS"]]), "OP")
        .appendField("=")
        .appendField(new Blockly.FieldNumber(10, 0, 9999), "VALUE");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(300);
    this.setTooltip("Збільшує або зменшує значення змінної.");
  }
};

// ❓ Якщо змінна [умова] число → показати текст
Blockly.Blocks['if_show_text'] = {
  init() {
    this.appendDummyInput()
        .appendField("❓ Якщо")
        .appendField(new Blockly.FieldTextInput("здоров'я"), "VAR")
        .appendField(new Blockly.FieldDropdown([
          ["<","LT"],["<=","LTE"],["==","EQ"],[">","GT"],[">=","GTE"]
        ]), "OP")
        .appendField(new Blockly.FieldNumber(50), "VAL")
        .appendField("→ текст:");
    this.appendDummyInput()
        .appendField("   Мовець:")
        .appendField(new Blockly.FieldTextInput(""), "SPEAKER");
    this.appendDummyInput()
        .appendField("   Фраза:")
        .appendField(new Blockly.FieldTextInput("Ти виглядаєш погано..."), "TEXT");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(0);
    this.setTooltip("Якщо умова виконується — показує текст. Інакше пропускає.");
  }
};

// ❓ Якщо змінна [умова] число → перейти до сцени
Blockly.Blocks['if_go_to_scene'] = {
  init() {
    this.appendDummyInput()
        .appendField("❓ Якщо")
        .appendField(new Blockly.FieldTextInput("здоров'я"), "VAR")
        .appendField(new Blockly.FieldDropdown([
          ["<","LT"],["<=","LTE"],["==","EQ"],[">","GT"],[">=","GTE"]
        ]), "OP")
        .appendField(new Blockly.FieldNumber(50), "VAL")
        .appendField("→ сцена:");
    this.appendDummyInput()
        .appendField("   Назва сцени:")
        .appendField(new Blockly.FieldTextInput("Кінець"), "TARGET");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(0);
    this.setTooltip("Якщо умова виконується — переходить до сцени. Інакше продовжує далі.");
  }
};

Blockly.Blocks['choice'] = {
  init() {
    this.appendDummyInput().appendField("🔀 Вибір гравця");
    this.appendStatementInput("OPTIONS").appendField("варіанти:");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(120);
    this.setTooltip("Показує кнопки вибору. Після вибору переходить до сцени.");
  }
};

Blockly.Blocks['choice_option'] = {
  init() {
    this.appendDummyInput()
        .appendField('"')
        .appendField(new Blockly.FieldTextInput("Так"), "TEXT")
        .appendField('" → сцена:')
        .appendField(new Blockly.FieldTextInput("Вулиця"), "TARGET");
    this.setPreviousStatement(true); this.setNextStatement(true);
    this.setColour(140);
    this.setTooltip("Один варіант вибору — куди перейти після нього.");
  }
};

Blockly.Blocks['go_to_scene'] = {
  init() {
    this.appendDummyInput()
        .appendField("➡ Перейти до сцени")
        .appendField(new Blockly.FieldTextInput("Вулиця"), "NAME");
    this.setPreviousStatement(true);
    this.setColour(200);
    this.setTooltip("Переходить до іншої сцени. Блоки після цього не виконуються.");
  }
};

// ══════════════════════════════════════════════════════════════
// TOOLBOX
// ══════════════════════════════════════════════════════════════
const toolbox = {
  kind: "categoryToolbox",
  contents: [
    { kind:"category", name:"🎬 Сцени",    colour:"160", contents:[
      { kind:"block", type:"start_scene" },
      { kind:"block", type:"go_to_scene" }
    ]},
    { kind:"category", name:"🖼 Вигляд",   colour:"20",  contents:[
      { kind:"block", type:"set_background" },
      { kind:"block", type:"show_image"     },
      { kind:"block", type:"hide_characters"}
    ]},
    { kind:"category", name:"💬 Текст",    colour:"230", contents:[
      { kind:"block", type:"display_text" }
    ]},
    { kind:"category", name:"📦 Змінні",   colour:"300", contents:[
      { kind:"block", type:"set_variable"    },
      { kind:"block", type:"change_variable" }
    ]},
    { kind:"category", name:"❓ Логіка",   colour:"0",   contents:[
      { kind:"block", type:"if_show_text"   },
      { kind:"block", type:"if_go_to_scene" }
    ]},
    { kind:"category", name:"🔀 Вибір",    colour:"120", contents:[
      { kind:"block", type:"choice"        },
      { kind:"block", type:"choice_option" }
    ]}
  ]
};

// ══════════════════════════════════════════════════════════════
// INIT WORKSPACE
// ══════════════════════════════════════════════════════════════
workspace = Blockly.inject('blocklyDiv', {
  toolbox,
  trashcan: true,
  zoom: { controls: true, wheel: true },
  scrollbars: true,
  theme: Blockly.Theme.defineTheme('dark', {
    base: Blockly.Themes.Classic,
    componentStyles: {
      workspaceBackgroundColour: '#12111a',
      toolboxBackgroundColour:   '#1c1b27',
      toolboxForegroundColour:   '#e8e6ff',
      flyoutBackgroundColour:    '#1c1b27',
      flyoutForegroundColour:    '#e8e6ff',
      flyoutOpacity: 1,
      scrollbarOpacity: .4,
    }
  })
});

// ══════════════════════════════════════════════════════════════
// IMAGE UPLOAD via Cloudflare Worker
// ══════════════════════════════════════════════════════════════
const WORKER_URL = 'https://mindmap.riznyk-alex-mail.workers.dev';

function showUploadProgress(blockId, show) {
  const block = workspace.getBlockById(blockId);
  if (!block) return;
  block.setFieldValue(show ? "⏳ Завантаження…" : (imageStore[blockId] ? "✓ Готово" : "натисни для завантаження"), "LABEL");
}

async function uploadToWorker(file) {
  const form = new FormData();
  form.append('image', file);
  const res  = await fetch(WORKER_URL + '/upload', { method: 'POST', body: form });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Upload failed');
  return data.url; // публічний URL
}

async function handleImageClick(block) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    showUploadProgress(block.id, true);
    try {
      const url = await uploadToWorker(file);
      imageStore[block.id] = url;
      const short = file.name.length > 18 ? file.name.slice(0,16)+'…' : file.name;
      block.setFieldValue("✓ " + short, "LABEL");
      showToast("✓ Завантажено: " + file.name);
    } catch (err) {
      block.setFieldValue("❌ Помилка", "LABEL");
      showToast("⚠ Помилка завантаження: " + err.message);
      console.error(err);
    }
  };
  input.click();
}

workspace.addChangeListener(function(event) {
  if (event.type !== Blockly.Events.CLICK) return;
  const block = workspace.getBlockById(event.blockId);
  if (!block) return;
  if (block.type === "set_background" || block.type === "show_image") {
    handleImageClick(block);
  }
});

// status bar block count
workspace.addChangeListener(function() {
  document.getElementById('stBlocks').textContent =
    workspace.getAllBlocks(false).length;
});

// ══════════════════════════════════════════════════════════════
// SCENE BUILDING
// ══════════════════════════════════════════════════════════════
function buildScenes() {
  scenes = {};
  workspace.getTopBlocks(true).forEach(block => {
    if (block.type !== "start_scene") return;
    const name = block.getFieldValue("NAME").trim();
    if (!name) return;
    scenes[name] = [];
    let cur = block.getNextBlock();
    while (cur) { scenes[name].push(cur); cur = cur.getNextBlock(); }
  });
}

// ══════════════════════════════════════════════════════════════
// PREVIEW HELPERS
// ══════════════════════════════════════════════════════════════
function clearPreview() {
  document.getElementById("background").style.backgroundImage = "";
  document.getElementById("bg-placeholder").style.display = "flex";
  document.getElementById("slot-left").innerHTML = "";
  document.getElementById("slot-center").innerHTML = "";
  document.getElementById("slot-right").innerHTML = "";
  document.getElementById("text").innerText = "";
  document.getElementById("speaker").innerText = "";
  document.getElementById("choices").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";
}

function setBackground(dataURL) {
  document.getElementById("background").style.backgroundImage = `url('${dataURL}')`;
  document.getElementById("bg-placeholder").style.display = "none";
}

function showSpeech(speaker, text) {
  document.getElementById("speaker").innerText = speaker || "";
  document.getElementById("text").innerText = text;
  document.getElementById("nextBtn").style.display = "block";
  document.getElementById("choices").innerHTML = "";
  waitingForUser = true;
  document.getElementById("stScene").textContent = currentScene || "—";
}

function showChoices(options) {
  // options: [{text, target}]
  document.getElementById("nextBtn").style.display = "none";
  const div = document.getElementById("choices");
  div.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt.text;
    btn.onclick = () => goToScene(opt.target);
    div.appendChild(btn);
  });
  waitingForUser = true;
}

// ══════════════════════════════════════════════════════════════
// EXECUTION ENGINE
// ══════════════════════════════════════════════════════════════
let currentScene = null;

function goToScene(name) {
  if (!name || !scenes[name]) {
    showToast(`⚠ Сцена "${name}" не знайдена`);
    return;
  }
  clearPreview();
  currentScene = name;
  document.getElementById("stScene").textContent = name;
  execQueue = scenes[name].slice(); // copy
  execIndex = 0;
  waitingForUser = false;
  runNext();
}

// Called after user presses "Далі" or a choice — continues execution
function onNext() {
  document.getElementById("nextBtn").style.display = "none";
  waitingForUser = false;
  runNext();
}

function runNext() {
  while (execIndex < execQueue.length) {
    const block = execQueue[execIndex];
    execIndex++;

    const stop = executeBlock(block);
    if (stop) return; // paused, waiting for user
  }
  // end of scene
  document.getElementById("nextBtn").style.display = "none";
}

function executeBlock(block) {
  if (!block) return false;

  switch (block.type) {

    case "display_text": {
      const speaker = block.getFieldValue("SPEAKER") || "";
      const text    = block.getFieldValue("TEXT") || "";
      showSpeech(speaker, text);
      return true; // pause
    }

    case "set_background": {
      const img = imageStore[block.id];
      if (img) setBackground(img);
      return false;
    }

    case "show_image": {
      const img = imageStore[block.id];
      if (img) {
        const pos   = block.getFieldValue("POSITION");
        const slot  = document.getElementById("slot-" + pos);
        const el    = document.createElement("img");
        el.src = img;
        slot.innerHTML = "";   // один спрайт на слот
        slot.appendChild(el);
      } else {
        showToast("⚠ Натисніть на блок персонажа і завантажте зображення");
      }
      return false;
    }

    case "hide_characters": {
      ["left","center","right"].forEach(p =>
        document.getElementById("slot-"+p).innerHTML = "");
      return false;
    }

    case "set_variable": {
      const key = block.getFieldValue("VAR");
      variables[key] = Number(block.getFieldValue("VALUE"));
      updateVarDisplay();
      return false;
    }

    case "change_variable": {
      const key = block.getFieldValue("VAR");
      const op  = block.getFieldValue("OP");
      const val = Number(block.getFieldValue("VALUE"));
      variables[key] = (variables[key] || 0) + (op === "PLUS" ? val : -val);
      updateVarDisplay();
      return false;
    }

    case "if_show_text": {
      const varVal = variables[block.getFieldValue("VAR")] ?? 0;
      const op     = block.getFieldValue("OP");
      const num    = Number(block.getFieldValue("VAL"));
      const ok = op==="LT"?varVal<num : op==="LTE"?varVal<=num :
                 op==="EQ"?varVal==num: op==="GT"?varVal>num : varVal>=num;
      if (ok) {
        showSpeech(block.getFieldValue("SPEAKER"), block.getFieldValue("TEXT"));
        return true; // pause for user
      }
      return false;
    }

    case "if_go_to_scene": {
      const varVal = variables[block.getFieldValue("VAR")] ?? 0;
      const op     = block.getFieldValue("OP");
      const num    = Number(block.getFieldValue("VAL"));
      const ok = op==="LT"?varVal<num : op==="LTE"?varVal<=num :
                 op==="EQ"?varVal==num: op==="GT"?varVal>num : varVal>=num;
      if (ok) {
        goToScene(block.getFieldValue("TARGET"));
        return true;
      }
      return false;
    }

    case "go_to_scene": {
      goToScene(block.getFieldValue("NAME"));
      return true; // pause (new scene takes over)
    }

    case "choice": {
      const options = [];
      let opt = block.getInputTargetBlock("OPTIONS");
      while (opt) {
        if (opt.type === "choice_option") {
          options.push({
            text:   opt.getFieldValue("TEXT"),
            target: opt.getFieldValue("TARGET")
          });
        }
        opt = opt.getNextBlock();
      }
      showChoices(options);
      return true; // pause
    }

    default:
      return false;
  }
}

// ══════════════════════════════════════════════════════════════
// PUBLIC CONTROLS
// ══════════════════════════════════════════════════════════════
function startNovel() {
  variables = {};
  buildScenes();
  const first = Object.keys(scenes)[0];
  if (first) goToScene(first);
  else showToast("⚠ Додайте блок 🎬 СЦЕНА, щоб почати");
}

function updateVarDisplay() {
  const pairs = Object.entries(variables).map(([k,v]) => `${k}=${v}`);
  document.getElementById('stVars').textContent = pairs.length ? pairs.join(', ') : '—';
}

// ══════════════════════════════════════════════════════════════
// SAVE / LOAD  — imageStore містить публічні URL (не base64)
// ══════════════════════════════════════════════════════════════
function saveProject() {
  buildScenes();
  const project = {
    version: 3,
    timestamp: new Date().toISOString(),
    workspace: Blockly.serialization.workspaces.save(workspace),
    imageStore  // { blockId: "https://..." }
  };
  const link = document.createElement('a');
  link.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(project, null, 2));
  link.download = 'vn_project.json';
  link.click();
  showToast("Проєкт збережено ✓");
}

function loadProject() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const project = JSON.parse(ev.target.result);
        Blockly.serialization.workspaces.load(project.workspace, workspace);
        imageStore = project.imageStore || {};
        startNovel();
        showToast("Проєкт завантажено ✓");
      } catch {
        showToast("⚠ Помилка при завантаженні файлу");
      }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

function clearWorkspace() {
  if (confirm("Очистити весь робочий простір?")) {
    workspace.clear();
    imageStore = {};
    clearPreview();
    document.getElementById("text").innerText = "";
    document.getElementById("stScene").textContent = "—";
    document.getElementById("stVars").textContent = "—";
  }
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}


// ══════════════════════════════════════════════════════════════
// EXPORT — генерує самодостатній HTML файл гри (без Blockly)
// ══════════════════════════════════════════════════════════════
function exportGame() {
  buildScenes();
  if (!Object.keys(scenes).length) {
    showToast("⚠ Немає жодної сцени для експорту");
    return;
  }

  // Серіалізуємо сцени у простий JSON-формат
  const scenesData = {};
  for (const [name, blocks] of Object.entries(scenes)) {
    scenesData[name] = [];
    for (const block of blocks) {
      const b = serializeBlock(block);
      if (b) scenesData[name].push(b);
    }
  }

  const firstScene = Object.keys(scenesData)[0];
  const gameData = JSON.stringify({ scenes: scenesData, first: firstScene }, null, 2);

  const exported = `<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Інтерактивна історія</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #12111a; color: #e8e6ff;
    font-family: 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  #game {
    width: 640px; max-width: 100%;
    aspect-ratio: 16/10;
    position: relative; background: #000;
    display: flex; flex-direction: column;
    overflow: hidden; border-radius: 8px;
    box-shadow: 0 8px 48px rgba(0,0,0,.8);
  }
  #background {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
  }
  #slots {
    position: absolute; top: 0; left: 0; right: 0; bottom: 170px;
    display: flex; align-items: flex-end;
  }
  .slot {
    flex: 1; height: 100%;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
  }
  .slot img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  #textbox {
    position: relative; z-index: 10; margin-top: auto;
    background: linear-gradient(180deg, rgba(18,17,26,0) 0%, rgba(18,17,26,.97) 18px);
    padding: 16px 18px 14px; min-height: 170px;
    display: flex; flex-direction: column;
  }
  #speaker { font-weight: 700; font-size: .9em; color: #7c6af7; margin-bottom: 6px; min-height: 18px; }
  #text { font-size: 1em; line-height: 1.6; min-height: 60px; flex: 1; }
  #nextBtn {
    align-self: flex-end; margin-top: 10px;
    padding: 8px 22px; background: #7c6af7;
    color: #fff; border: none; border-radius: 6px;
    cursor: pointer; font-size: .9em;
  }
  #nextBtn:hover { background: #6b5ae0; }
  #choices { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  #choices button {
    padding: 10px 14px; background: #2a2940;
    color: #e8e6ff; border: 1px solid #35345a;
    border-radius: 6px; cursor: pointer; text-align: left; font-size: .9em;
  }
  #choices button:hover { background: #3a3860; border-color: #f76a8c; color: #f76a8c; }
</style>
</head>
<body>
<div id="game">
  <div id="background"></div>
  <div id="slots">
    <div class="slot" id="slot-left"></div>
    <div class="slot" id="slot-center"></div>
    <div class="slot" id="slot-right"></div>
  </div>
  <div id="textbox">
    <div id="speaker"></div>
    <div id="text"></div>
    <button id="nextBtn" style="display:none" onclick="onNext()">Далі →</button>
    <div id="choices"></div>
  </div>
</div>
<script>
const GAME = ${gameData};

let scenes    = GAME.scenes;
let variables = {};
let execQueue = [];
let execIndex = 0;

function clearPreview() {
  document.getElementById('background').style.backgroundImage = '';
  ['left','center','right'].forEach(p => document.getElementById('slot-'+p).innerHTML = '');
  document.getElementById('text').innerText    = '';
  document.getElementById('speaker').innerText = '';
  document.getElementById('choices').innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';
}

function goToScene(name) {
  if (!scenes[name]) { console.warn('Сцена не знайдена:', name); return; }
  clearPreview();
  execQueue = scenes[name].slice();
  execIndex = 0;
  runNext();
}

function runNext() {
  while (execIndex < execQueue.length) {
    const b = execQueue[execIndex++];
    if (execBlock(b)) return;
  }
  document.getElementById('nextBtn').style.display = 'none';
}

function onNext() {
  document.getElementById('nextBtn').style.display = 'none';
  runNext();
}

function evalCond(varName, op, val) {
  const v = variables[varName] ?? 0;
  if (op==='LT')  return v <  val;
  if (op==='LTE') return v <= val;
  if (op==='EQ')  return v == val;
  if (op==='GT')  return v >  val;
  if (op==='GTE') return v >= val;
  return false;
}

function execBlock(b) {
  switch (b.type) {
    case 'set_background':
      if (b.url) {
        document.getElementById('background').style.backgroundImage = \`url('\${b.url}')\`;
      }
      return false;
    case 'show_image':
      if (b.url) {
        const slot = document.getElementById('slot-' + b.position);
        slot.innerHTML = '';
        const img = document.createElement('img');
        img.src = b.url;
        slot.appendChild(img);
      }
      return false;
    case 'hide_characters':
      ['left','center','right'].forEach(p => document.getElementById('slot-'+p).innerHTML = '');
      return false;
    case 'display_text':
      document.getElementById('speaker').innerText = b.speaker || '';
      document.getElementById('text').innerText    = b.text;
      document.getElementById('nextBtn').style.display = 'block';
      document.getElementById('choices').innerHTML = '';
      return true;
    case 'set_variable':
      variables[b.var] = b.value;
      return false;
    case 'change_variable':
      variables[b.var] = (variables[b.var] || 0) + (b.op === 'PLUS' ? b.value : -b.value);
      return false;
    case 'if_show_text':
      if (evalCond(b.var, b.op, b.val)) {
        document.getElementById('speaker').innerText = b.speaker || '';
        document.getElementById('text').innerText    = b.text;
        document.getElementById('nextBtn').style.display = 'block';
        return true;
      }
      return false;
    case 'if_go_to_scene':
      if (evalCond(b.var, b.op, b.val)) { goToScene(b.target); return true; }
      return false;
    case 'go_to_scene':
      goToScene(b.target);
      return true;
    case 'choice': {
      document.getElementById('nextBtn').style.display = 'none';
      const div = document.getElementById('choices');
      div.innerHTML = '';
      b.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.textContent = opt.text;
        btn.onclick = () => goToScene(opt.target);
        div.appendChild(btn);
      });
      return true;
    }
    default: return false;
  }
}

goToScene(GAME.first);
<\/script>
</body>
</html>`;

  const link = document.createElement('a');
  link.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(exported);
  link.download = 'game.html';
  link.click();
  showToast("✓ Гру експортовано як game.html");
}

// Перетворює Blockly-блок у простий об'єкт для експорту
function serializeBlock(block) {
  switch (block.type) {
    case 'set_background':
      return { type: 'set_background', url: imageStore[block.id] || null };
    case 'show_image':
      return { type: 'show_image', url: imageStore[block.id] || null, position: block.getFieldValue('POSITION') };
    case 'hide_characters':
      return { type: 'hide_characters' };
    case 'display_text':
      return { type: 'display_text', speaker: block.getFieldValue('SPEAKER'), text: block.getFieldValue('TEXT') };
    case 'set_variable':
      return { type: 'set_variable', var: block.getFieldValue('VAR'), value: Number(block.getFieldValue('VALUE')) };
    case 'change_variable':
      return { type: 'change_variable', var: block.getFieldValue('VAR'), op: block.getFieldValue('OP'), value: Number(block.getFieldValue('VALUE')) };
    case 'if_show_text':
      return { type: 'if_show_text', var: block.getFieldValue('VAR'), op: block.getFieldValue('OP'), val: Number(block.getFieldValue('VAL')), speaker: block.getFieldValue('SPEAKER'), text: block.getFieldValue('TEXT') };
    case 'if_go_to_scene':
      return { type: 'if_go_to_scene', var: block.getFieldValue('VAR'), op: block.getFieldValue('OP'), val: Number(block.getFieldValue('VAL')), target: block.getFieldValue('TARGET') };
    case 'go_to_scene':
      return { type: 'go_to_scene', target: block.getFieldValue('NAME') };
    case 'choice': {
      const options = [];
      let opt = block.getInputTargetBlock('OPTIONS');
      while (opt) {
        if (opt.type === 'choice_option') options.push({ text: opt.getFieldValue('TEXT'), target: opt.getFieldValue('TARGET') });
        opt = opt.getNextBlock();
      }
      return { type: 'choice', options };
    }
    default: return null;
  }
}

console.log("✅ VN Builder v3 запущено. Натисніть 🎓 Демо, щоб побачити приклад.");
</script>
</body>
